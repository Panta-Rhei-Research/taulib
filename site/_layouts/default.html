<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  {% include header.html %}
  <div class="drawer-backdrop" id="drawer-backdrop"></div>

  <div class="page-grid">
    {% include left-rail.html %}

    <main class="main-content" id="main-content" data-pagefind-body>
      {{ content }}
    </main>

    {% include right-rail.html %}
  </div>

  {% include footer.html %}

  <!-- Search overlay -->
  <div id="search-overlay" class="search-overlay" hidden>
    <div class="search-overlay-backdrop" onclick="closeSearch()"></div>
    <div class="search-overlay-panel glass">
      <div class="search-overlay-header">
        <span class="search-overlay-title">Search the Atlas</span>
        <button class="search-overlay-close" onclick="closeSearch()" aria-label="Close search">&times;</button>
      </div>
      <div id="search-container"></div>
    </div>
  </div>

  <script>
    // Pagefind search initialization (uses globally loaded PagefindUI from head.html)
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof PagefindUI !== 'undefined') {
        new PagefindUI({
          element: "#search-container",
          showSubResults: true,
          showImages: false,
        });
      } else {
        document.getElementById('search-container').innerHTML =
          '<p style="padding:16px;color:#5b6772;font-size:0.88rem;">Search will be available once the site is deployed.</p>';
      }
    });

    var _searchPreviousFocus = null;
    function openSearch() {
      _searchPreviousFocus = document.activeElement;
      // Close other mobile surfaces
      if (window.closeTocDropdown) window.closeTocDropdown();
      if (window.toggleHamburger) window.toggleHamburger(false);
      document.getElementById('search-overlay').hidden = false;
      document.body.style.overflow = 'hidden';
      setTimeout(function() {
        var input = document.querySelector('#search-container input');
        if (input) input.focus();
      }, 100);
    }
    function closeSearch() {
      document.getElementById('search-overlay').hidden = true;
      document.body.style.overflow = '';
      if (_searchPreviousFocus && _searchPreviousFocus.focus) {
        _searchPreviousFocus.focus();
        _searchPreviousFocus = null;
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeSearch();
      if ((e.key === '/' || (e.key === 'k' && (e.metaKey || e.ctrlKey))) && !e.target.matches('input, textarea')) {
        e.preventDefault();
        openSearch();
      }
    });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Assign ids to H2 elements (matching Liquid slugify for TOC anchor targets)
      var headings = document.querySelectorAll('.main-content h2');
      headings.forEach(function(h) {
        if (!h.id) h.id = h.textContent.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
      });

      // IntersectionObserver for active TOC link highlighting
      var toc = document.getElementById('toc');
      if (!toc) return;
      var tocLinks = [];
      var tocAnchors = toc.querySelectorAll('.toc-link');
      tocAnchors.forEach(function(a) {
        var targetId = a.getAttribute('href').replace('#', '');
        var el = document.getElementById(targetId);
        if (el) tocLinks.push({ el: el, link: a });
      });

      if (tocLinks.length > 0) {
        var observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              tocLinks.forEach(function(t) { t.link.classList.remove('active'); });
              var match = tocLinks.find(function(t) { return t.el === entry.target; });
              if (match) {
                match.link.classList.add('active');
                // Also sync header TOC dropdown active state
                var headerLinks = document.querySelectorAll('.toc-dropdown-link');
                headerLinks.forEach(function(l) { l.classList.remove('active'); });
                var headerMatch = Array.from(headerLinks).find(function(l) {
                  return l.getAttribute('href') === '#' + entry.target.id;
                });
                if (headerMatch) headerMatch.classList.add('active');
              }
            }
          });
        }, { rootMargin: '-80px 0px -70% 0px', threshold: 0 });

        tocLinks.forEach(function(t) { observer.observe(t.el); });
      }

      // Populate header TOC dropdown on mobile
      if (!window.matchMedia('(min-width: 761px)').matches && tocAnchors.length > 0) {
        var tocWrapper = document.getElementById('header-toc-wrapper');
        var tocDropdown = document.getElementById('header-toc-dropdown');
        if (tocWrapper && tocDropdown) {
          tocWrapper.hidden = false;
          tocAnchors.forEach(function(a) {
            var clone = a.cloneNode(true);
            clone.className = 'toc-dropdown-link';
            clone.addEventListener('click', function() {
              if (window.closeTocDropdown) window.closeTocDropdown();
            });
            tocDropdown.appendChild(clone);
          });
        }
      }

      // Populate mega-menu section navigation on mobile
      if (!window.matchMedia('(min-width: 1081px)').matches) {
        var leftRailBody = document.querySelector('.left-rail .rail-collapse-body');
        var megaTarget = document.getElementById('mega-section-nav');
        if (leftRailBody && megaTarget) {
          megaTarget.innerHTML = leftRailBody.innerHTML;
        }
      }
    });
  </script>

  <script>
    // Header TOC dropdown toggle
    (function() {
      var tocBtn = document.querySelector('.header-toc-btn');
      var tocDropdown = document.getElementById('header-toc-dropdown');
      var tocWrapper = document.getElementById('header-toc-wrapper');
      if (!tocBtn || !tocDropdown) return;

      function openToc() {
        tocDropdown.hidden = false;
        tocBtn.setAttribute('aria-expanded', 'true');
        // Close hamburger if open
        if (window.toggleHamburger) window.toggleHamburger(false);
      }

      function closeToc() {
        tocDropdown.hidden = true;
        tocBtn.setAttribute('aria-expanded', 'false');
      }

      window.closeTocDropdown = closeToc;

      tocBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var isOpen = tocBtn.getAttribute('aria-expanded') === 'true';
        if (isOpen) closeToc(); else openToc();
      });

      document.addEventListener('click', function(e) {
        if (tocWrapper && !tocWrapper.contains(e.target)) closeToc();
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && tocBtn.getAttribute('aria-expanded') === 'true') {
          closeToc();
          tocBtn.focus();
        }
      });

      // Auto-close on resize above mobile breakpoint
      var mq = window.matchMedia('(min-width: 761px)');
      mq.addEventListener('change', function(e) { if (e.matches) closeToc(); });
    })();
  </script>

  <script>
    // Mobile hamburger mega-menu toggle
    (function() {
      var hamburger = document.querySelector('.header-hamburger');
      var nav = document.getElementById('mobile-nav');
      var backdrop = document.getElementById('drawer-backdrop');
      if (!hamburger || !nav) return;

      function toggle(open) {
        var isOpen = typeof open === 'boolean' ? open : !nav.classList.contains('is-open');
        nav.classList.toggle('is-open', isOpen);
        backdrop.classList.toggle('is-active', isOpen);
        hamburger.setAttribute('aria-expanded', String(isOpen));
        hamburger.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
        document.body.classList.toggle('nav-open', isOpen);
        // Close TOC dropdown when opening hamburger
        if (isOpen && window.closeTocDropdown) window.closeTocDropdown();
      }

      window.toggleHamburger = toggle;

      hamburger.addEventListener('click', function() { toggle(); });
      backdrop.addEventListener('click', function() { toggle(false); });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && nav.classList.contains('is-open')) toggle(false);
      });

      // Auto-close on resize above mobile breakpoint
      var mq = window.matchMedia('(min-width: 761px)');
      mq.addEventListener('change', function(e) {
        if (e.matches) {
          toggle(false);
          if (window.closeTocDropdown) window.closeTocDropdown();
        }
      });
    })();
  </script>

</body>
</html>
