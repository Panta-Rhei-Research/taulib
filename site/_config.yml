title: "TauLib"
description: "Generated Lean 4 documentation for TauLib, the formalization surface of the Panta Rhei Research Program. Includes routes to WP003, Verify / TauLib, the Release Manifest, and the public GitHub repository."
url: "https://taulib.site"
baseurl: ""

# Social / SEO metadata
image: /assets/og-image.png
author:
  name: "Thorsten Fuchs & Anna-Sophie Fuchs"
social:
  name: "TauLib — Panta Rhei Research Program"
  links:
    - "https://github.com/Panta-Rhei-Research/taulib"

permalink: pretty

collections:
  taulib_docs:
    output: true
    permalink: /docs/:name/

collections_dir: .

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-sitemap

include:
  - _headers

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - .DS_Store
  - scripts/        # site maintenance scripts (sync-design-tokens.sh, etc.)

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      type: "taulib_docs"
    values:
      layout: "taulib-doc"
