<header class="site-header">
  <a href="{{ '/' | relative_url }}" class="header-brand">
    <span class="brand-stack">
      <span class="brand-title">TauLib</span>
      <span class="brand-sub">Lean 4 formalization &middot; Panta Rhei Research</span>
    </span>
  </a>

  <!-- Mobile + desktop header controls -->
  <div class="header-controls">
    <!-- TOC dropdown (shown by JS only when page has h2 headings) -->
    <div class="header-toc-wrapper" id="header-toc-wrapper" hidden>
      <button class="header-toc-btn" aria-label="On this page" aria-expanded="false" type="button">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
          <line x1="6" y1="4" x2="15" y2="4"/>
          <line x1="6" y1="9" x2="15" y2="9"/>
          <line x1="6" y1="14" x2="15" y2="14"/>
          <circle cx="3" cy="4" r="1" fill="currentColor" stroke="none"/>
          <circle cx="3" cy="9" r="1" fill="currentColor" stroke="none"/>
          <circle cx="3" cy="14" r="1" fill="currentColor" stroke="none"/>
        </svg>
        <svg class="header-toc-chevron" width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="4 6 8 10 12 6"/></svg>
      </button>
      <div class="header-toc-dropdown" id="header-toc-dropdown" hidden>
        <!-- Populated by JS from right-rail TOC -->
      </div>
    </div>

    <!-- Search button (always visible — 1-tap access) -->
    <button class="header-search" aria-label="Search (press / or Ctrl+K)" type="button" onclick="openSearch()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="6.5" cy="6.5" r="5"/>
        <line x1="10" y1="10" x2="14.5" y2="14.5"/>
      </svg>
    </button>

    <!-- Hamburger (mobile only) -->
    <button class="header-hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-nav" type="button">
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
    </button>
  </div>

  <!-- Navigation drawer (desktop: inline links / mobile: slide-out mega-menu) -->
  <nav class="header-nav" id="mobile-nav" aria-label="Main">
    {% for item in site.data.nav.header %}
    <a href="{{ item.url }}" class="header-nav-link" {% if item.external %}target="_blank" rel="noopener"{% endif %}>{{ item.title }}</a>
    {% endfor %}

    <!-- Mega-menu section navigation (populated by JS on mobile) -->
    <div class="mega-section-nav" id="mega-section-nav" aria-label="Module navigation"></div>
  </nav>
</header>
