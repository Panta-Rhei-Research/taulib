# ============================================================
# TauLib Documentation — Build & Deploy to GitHub Pages
# ============================================================
#
# Pipeline:
#   1. Build TauLib library (lean-action: elan, cache, lake build)
#   2. Generate doc-gen4 HTML (all modules, into docbuild/.lake)
#   3. Copy doc output to _docgen_output/ (preserves cache integrity)
#   4. Filter to TauLib-only (strip Lean/Mathlib/Std/etc.)
#   5. Extract doc-gen4 content → Jekyll collection + nav data
#   6. Copy doc-gen4 static assets (CSS, declarations, fonts)
#   7. Build Jekyll site (site/ directory)
#   8. Deploy site/_site/ to GitHub Pages
#
# Architecture:
#   The Jekyll site in site/ provides the Panta Rhei shell (header,
#   footer, glassmorphism, 3-column layout). Doc-gen4 module content
#   is extracted into _taulib_docs/ collection files. The nav tree
#   is extracted into _data/nav_modules.yml for Liquid templating.
#
# Triggers:
#   - Push to main (when source files change)
#   - Manual dispatch via Actions tab
#
# One-time setup (in repo Settings → Pages → Source):
#   Select "GitHub Actions" (not "Deploy from a branch")
# ============================================================

name: Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'TauLib/**'
      - 'docbuild/**'
      - 'scripts/**'
      - 'registry/**'
      - 'site/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:    # Manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write      # Required for OIDC-based Pages deployment

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── Job 1: Build everything ───────────────────────────────
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── Build TauLib library ────────────────────────────────
      - name: Build TauLib
        uses: leanprover/lean-action@v1
        with:
          build-args: ""

      # ── Generate doc-gen4 HTML (cached) ─────────────────────
      - name: Cache docbuild
        uses: actions/cache@v4
        with:
          path: docbuild/.lake
          key: docbuild-v2-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'docbuild/lakefile.toml') }}

      - name: Initialize doc-gen4
        run: |
          cd docbuild
          MATHLIB_NO_CACHE_ON_UPDATE=1 lake update doc-gen4

      - name: Generate documentation
        run: |
          cd docbuild
          lake build TauLib:docs

      # ── Copy and filter doc-gen4 output ─────────────────────
      - name: Prepare doc-gen4 output
        run: |
          echo "Copying doc output..."
          cp -r docbuild/.lake/build/doc _docgen_output
          echo "  Size: $(du -sh _docgen_output | cut -f1)"
          echo "  HTML files: $(find _docgen_output -name '*.html' | wc -l | tr -d ' ')"

      - name: Filter to TauLib-only
        run: python3 scripts/filter_docs.py --doc-dir _docgen_output

      # ── Extract content for Jekyll ──────────────────────────
      - name: Extract module docs → Jekyll collection
        run: python3 scripts/extract_docs.py --input _docgen_output --output site/_taulib_docs

      - name: Extract navigation → YAML data
        run: python3 scripts/extract_nav.py --input _docgen_output/navbar.html --output site/_data/nav_modules.yml

      - name: Copy doc-gen4 static assets
        run: |
          # NOTE: We do NOT copy doc-gen4's style.css — it contains global
          # rules (header, .nav, a, *) that conflict with the Jekyll shell.
          # Declaration styling is handled by our _sass/_docgen.scss instead.

          # Search declarations index
          if [ -d "_docgen_output/declarations" ]; then
            mkdir -p site/assets/declarations
            cp _docgen_output/declarations/* site/assets/declarations/
          fi

      # ── Build Jekyll site ───────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          # 3.3+ required because html-proofer 5.2's transitive dep
          # io-event-1.15 pins `required_ruby_version: >= 3.3`.
          # Matches the sibling site/ repo (also Ruby 3.3).
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: site

      - name: Build Jekyll
        run: |
          cd site
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      # ── Build Pagefind search index ─────────────────────────
      # Indexes site/_site/ after Jekyll build, writes /pagefind/pagefind.js
      # and associated index/fragment files consumed by pagefind-ui.js in
      # the site header's search button. Runs in under 10s for ~460 pages.
      - name: Build Pagefind search index
        run: npx -y pagefind --site site/_site

      # ── Smoke-test the built artifact ───────────────────────
      # Validates every expected asset, body-content marker, and
      # anti-regression string in the built _site/ before upload.
      # No CDN / no network — runs in ~2s against local files.
      # Fails the build visibly if anything regressed. See
      # .github/scripts/smoke-test.sh for the check matrix.
      - name: Smoke-test build artifact
        run: |
          chmod +x .github/scripts/smoke-test.sh
          .github/scripts/smoke-test.sh site/_site

      # ── Dead-link audit (html-proofer, internal-only) ──────
      # Checks every internal <a href>, <img src>, <script src>
      # in the built _site/ tree (Jekyll shell + 460 doc-gen4
      # module pages). Fails on any new broken internal link.
      - name: Dead-link audit
        run: |
          chmod +x .github/scripts/link-check.sh
          .github/scripts/link-check.sh site/_site

      # ── Report ──────────────────────────────────────────────
      - name: Build summary
        run: |
          MODULE_COUNT=$(find site/_taulib_docs -name "*.html" 2>/dev/null | wc -l | tr -d ' ')
          PAGE_COUNT=$(find site/_site -name "*.html" 2>/dev/null | wc -l | tr -d ' ')
          TOTAL_SIZE=$(du -sh site/_site | cut -f1)

          echo "## 📖 Documentation Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| TauLib module docs | $MODULE_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Total HTML pages | $PAGE_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Output size | $TOTAL_SIZE |" >> $GITHUB_STEP_SUMMARY

      # ── Upload for Pages deployment ─────────────────────────
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/_site

  # ── Job 2: Deploy to GitHub Pages ─────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
