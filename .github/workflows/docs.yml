# ============================================================
# TauLib Documentation — Build & Deploy to GitHub Pages
# ============================================================
#
# Pipeline:
#   1. Build TauLib library (lean-action: elan, cache, lake build)
#   2. Generate doc-gen4 HTML (all modules, into docbuild/.lake)
#   3. Copy doc output to _site/ (preserves cache integrity)
#   4. Filter _site/ to TauLib-only (strip Lean/Mathlib/Std/etc.)
#   5. Apply Panta Rhei CSS theme + custom landing page
#   6. Generate statistics dashboard + dependency graph
#   7. Deploy _site/ to GitHub Pages (artifact-based)
#
# Key architecture decision:
#   Post-processing (filter, theme, stats) operates on _site/,
#   NOT on docbuild/.lake/build/doc/. This keeps the docbuild
#   cache pristine — doc-gen4's index step can find all files
#   on subsequent cached runs.
#
# Triggers:
#   - Push to main (when source files change)
#   - Manual dispatch via Actions tab
#
# One-time setup (in repo Settings → Pages → Source):
#   Select "GitHub Actions" (not "Deploy from a branch")
# ============================================================

name: Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'TauLib/**'
      - 'docbuild/**'
      - 'scripts/**'
      - 'registry/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:    # Manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write      # Required for OIDC-based Pages deployment

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── Job 1: Build everything ───────────────────────────────
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build TauLib library ────────────────────────────────
      - name: Build TauLib
        uses: leanprover/lean-action@v1
        with:
          build-args: ""

      # ── Generate doc-gen4 HTML (cached) ─────────────────────
      - name: Cache docbuild
        uses: actions/cache@v4
        with:
          path: docbuild/.lake
          # Cache key v2: busts old corrupted cache from filtered builds
          key: docbuild-v2-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'docbuild/lakefile.toml') }}

      - name: Initialize doc-gen4
        run: |
          cd docbuild
          MATHLIB_NO_CACHE_ON_UPDATE=1 lake update doc-gen4

      - name: Generate documentation
        run: |
          cd docbuild
          lake build TauLib:docs

      # ── Copy to deploy directory (cache stays pristine) ─────
      - name: Prepare deploy directory
        run: |
          echo "Copying doc output to _site/ ..."
          cp -r docbuild/.lake/build/doc _site
          echo "  Size: $(du -sh _site | cut -f1)"
          echo "  HTML files: $(find _site -name '*.html' | wc -l | tr -d ' ')"

      # ── Post-process: filter + theme + landing page ─────────
      - name: Filter to TauLib-only
        run: python3 scripts/filter_docs.py --doc-dir _site

      - name: Apply theme and landing page
        run: |
          # CSS theme (always fresh since _site is a copy)
          cat scripts/taulib_theme.css >> _site/style.css

          # Self-hosted fonts (Manrope)
          if [ -d "scripts/fonts" ]; then
            mkdir -p _site/fonts
            cp scripts/fonts/*.woff2 _site/fonts/
          fi

          # Landing page
          python3 -c "
          import re
          with open('_site/index.html') as f: html = f.read()
          with open('scripts/landing_page.html') as f: content = f.read()
          html = re.sub(r'(<main>).*?(</main>)',
                        lambda m: m.group(1) + '\n' + content + '\n' + m.group(2),
                        html, flags=re.DOTALL)
          with open('_site/index.html', 'w') as f: f.write(html)
          print('Landing page replaced')
          "

      # ── Stats dashboard + dependency graph ──────────────────
      - name: Generate statistics dashboard
        run: |
          python3 scripts/generate_stats.py \
            --output _site/stats.html \
            --registry-dir registry \
            --lean-src TauLib

      - name: Generate dependency graph
        run: |
          python3 scripts/generate_depgraph.py \
            --output _site/depgraph.html \
            --registry-dir registry

      # ── Report ──────────────────────────────────────────────
      - name: Build summary
        run: |
          MODULE_COUNT=$(find _site/TauLib -name "*.html" 2>/dev/null | wc -l | tr -d ' ')
          TOTAL_SIZE=$(du -sh _site | cut -f1)
          DECL_COUNT=$(python3 -c "
          import json
          with open('_site/declarations/declaration-data.bmp') as f:
              d = json.load(f)
          print(len(d.get('declarations', {})))
          " 2>/dev/null || echo "?")
          STATS_OK=$([ -f _site/stats.html ] && echo "✅" || echo "❌")
          GRAPH_OK=$([ -f _site/depgraph.html ] && echo "✅" || echo "❌")

          echo "## 📖 Documentation Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| TauLib module pages | $MODULE_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Searchable declarations | $DECL_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Statistics dashboard | $STATS_OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency graph | $GRAPH_OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Output size | $TOTAL_SIZE |" >> $GITHUB_STEP_SUMMARY

      # ── Upload for Pages deployment ─────────────────────────
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  # ── Job 2: Deploy to GitHub Pages ─────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
