name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build TauLib
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lean build (via lean-action)
        uses: leanprover/lean-action@v1
        with:
          build-args: ""
          # lean-action automatically handles:
          # - elan/Lean installation from lean-toolchain
          # - .lake directory caching
          # - Mathlib cache detection (lake exe cache get)
          # - Running lake build

      # ===================================================================
      # peer-review-fixes-v1 (2026-04-19): POLICY ENFORCEMENT
      # ===================================================================
      # Pre-publication simulated peer review identified that the paper's
      # "tactics-only Mathlib" and "zero sorry in Books I-VI + three
      # methodological sorry in Book VII" claims were enforced only by
      # review convention — CI printed counts but did not assert them,
      # and no CI step rejected a forbidden-Mathlib-category import.
      # The two steps below convert both policies from convention to
      # merge-blocker.

      - name: Enforce tactics-only Mathlib import policy
        run: |
          set -euo pipefail
          FORBIDDEN='^import Mathlib\.(Order|Algebra|CategoryTheory|Topology|Analysis|Data\.Nat|Logic)\b'
          if hits=$(grep -rnE "$FORBIDDEN" TauLib/ --include='*.lean'); then
            echo "::error::Forbidden Mathlib mathematical-content import detected."
            echo "::error::TauLib's tactics-only-Mathlib policy forbids imports from"
            echo "::error::Mathlib.{Order, Algebra, CategoryTheory, Topology, Analysis, Data.Nat, Logic}."
            echo "::error::Offending lines:"
            echo "$hits"
            exit 1
          fi
          echo "✓ Tactics-only Mathlib policy: no forbidden direct imports detected."

      - name: Enforce axiom and sorry count invariants
        run: |
          # NOTE: we deliberately do NOT use `set -euo pipefail` here.
          # `grep` exits with code 1 when it finds no matches — which is the
          # DESIRED state for the sorry count (we want zero sorry-closed
          # declarations). Under `pipefail`, grep's exit-1 would propagate
          # through `| wc -l` and kill this step before the `test` check
          # could run, i.e. the CI assertion would self-destruct exactly
          # when the library is in the correct state. The `|| true` after
          # each grep absorbs that exit code safely.
          EXPECTED_AXIOMS=3
          EXPECTED_SORRY=0

          # Count actual `axiom` declarations (line starts with `axiom ` at
          # column 0). Docstring/comment prose mentioning "axiom" does not
          # match this anchor.
          AXIOMS=$(grep -r '^axiom ' TauLib/ --include='*.lean' 2>/dev/null | wc -l | tr -d ' ' || true)
          AXIOMS=${AXIOMS:-0}

          # Count actual sorry-closed declarations (robust multi-pass grep).
          #
          # STRATEGY: two-level grep approach to handle all known edge cases:
          #   Pass 1 – permissive: match any line containing `sorry` as a
          #            whole word (\bsorry\b) so we catch all of:
          #              `:= sorry`           standard
          #              `:= by sorry`        tactic block
          #              trailing `sorry`     with or without whitespace
          #              multiline bodies     where `:= sorry` lands on a
          #                                   continuation line
          #              prefixed keywords    protected/private/noncomputable
          #              attributed decls     @[simp] theorem ... := sorry
          #   Pass 2 – exclusion: drop lines whose sorry is not real code:
          #            a) single-line comments: the `--` comment marker
          #               appears BEFORE `sorry` on the same line
          #               (pattern: chars before sorry contain `--`)
          #            b) string literals: `sorry` enclosed in double-quotes
          #            c) block-comment openers `/-` at the start of the
          #               non-whitespace content on the line (catches /--
          #               docstring lines; full block-comment body tracking
          #               is not done in grep — see KNOWN LIMITATION below)
          #
          # KNOWN LIMITATION: multi-line block comments (`/- ... -/` spanning
          # several lines) where an interior line contains `sorry` and does
          # NOT also contain `/-` will still be counted. This is an
          # acceptable false-positive: (a) TauLib does not use such comments
          # in practice, and (b) the preferred long-term fix is to run
          #   lake env lean --run scripts/check_no_sorry.lean
          # which queries the kernel Environment and is exact. That script
          # is planned for a future CI wave (tracked in peer-review-fixes).
          SORRY_CANDIDATES=$( { grep -rnE '\bsorry\b' TauLib/ --include='*.lean' 2>/dev/null || true; } )
          # Filter out non-code sorry occurrences using awk so that colons
          # inside the content field (e.g. "comment: := sorry") don't confuse
          # the field-splitting that a pure grep -v [^:]* approach would require.
          # awk splits on ':' and reconstructs the content from field 3 onward,
          # then applies three exclusions on the content only:
          #   a) drop if '--' appears before 'sorry' (single-line comment)
          #   b) drop if content matches "...sorry..." inside double-quotes
          #   c) drop if non-whitespace content starts with /- (block comment)
          SORRY_FILTER='{ content=""; for(i=3;i<=NF;i++) content=content (i==3?"":":") $i;
            dp=index(content,"--"); sp=index(content,"sorry");
            if(dp>0 && dp<sp) next;
            if(content ~ /"[^"]*sorry[^"]*"/) next;
            stripped=content; gsub(/^[ \t]*/,"",stripped);
            if(stripped ~ /^\/\-/) next;
            print $0 }'
          SORRY=$(echo "$SORRY_CANDIDATES" | awk -F: "$SORRY_FILTER" | wc -l | tr -d ' ')
          SORRY=${SORRY:-0}

          echo "Expected: axioms=$EXPECTED_AXIOMS, sorry=$EXPECTED_SORRY"
          echo "Actual:   axioms=$AXIOMS, sorry=$SORRY"

          FAIL=0
          if [ "$AXIOMS" != "$EXPECTED_AXIOMS" ]; then
            echo "::error::Axiom count drift: expected $EXPECTED_AXIOMS, got $AXIOMS."
            echo "::error::If this is an intentional change, update EXPECTED_AXIOMS in"
            echo "::error::.github/workflows/lean-build.yml AND the corresponding claim in"
            echo "::error::papers/taulib/main.tex (§7 + Appendix C) AND README.md."
            echo "::error::Current axioms:"
            grep -rn '^axiom ' TauLib/ --include='*.lean' 2>/dev/null || true
            FAIL=1
          fi
          if [ "$SORRY" != "$EXPECTED_SORRY" ]; then
            echo "::error::Sorry count drift: expected $EXPECTED_SORRY, got $SORRY."
            echo "::error::TauLib is sorry-free in all seven books since peer-review-fixes-v1."
            echo "::error::If a new sorry-closed declaration is intentional (e.g., a new"
            echo "::error::Book VII Commitment is being introduced), first discuss via issue,"
            echo "::error::then update EXPECTED_SORRY in this workflow and the paper's §8."
            echo "::error::Current sorry candidates (after comment exclusion):"
            echo "$SORRY_CANDIDATES" | awk -F: "$SORRY_FILTER" || true
            FAIL=1
          fi
          if [ "$FAIL" = "1" ]; then
            exit 1
          fi
          echo "✓ Axiom count: $AXIOMS (expected $EXPECTED_AXIOMS)"
          echo "✓ Sorry count: $SORRY (expected $EXPECTED_SORRY)"

      - name: Report statistics
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Sorry count uses the same grep+awk strategy as the assertion step
          # above so the summary table is always in sync with the merge-blocker.
          # See the "Enforce axiom and sorry count invariants" step for full
          # edge-case rationale and the known limitation on multi-line block
          # comments.
          SORRY_CANDIDATES=$( { grep -rnE '\bsorry\b' TauLib/ --include='*.lean' 2>/dev/null || true; } )
          SORRY_FILTER='{ content=""; for(i=3;i<=NF;i++) content=content (i==3?"":":") $i;
            dp=index(content,"--"); sp=index(content,"sorry");
            if(dp>0 && dp<sp) next;
            if(content ~ /"[^"]*sorry[^"]*"/) next;
            stripped=content; gsub(/^[ \t]*/,"",stripped);
            if(stripped ~ /^\/\-/) next;
            print $0 }'
          SORRY_COUNT=$(echo "$SORRY_CANDIDATES" | awk -F: "$SORRY_FILTER" | wc -l | tr -d ' ')
          SORRY_COUNT=${SORRY_COUNT:-0}

          echo "## Build Statistics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Files | $(find TauLib -name '*.lean' | wc -l | tr -d ' ') |" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | $(find TauLib -name '*.lean' -exec cat {} + | wc -l | tr -d ' ') |" >> $GITHUB_STEP_SUMMARY
          echo "| Sorry | $SORRY_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Axioms | $(grep -r '^axiom ' TauLib/ --include='*.lean' | wc -l | tr -d ' ') |" >> $GITHUB_STEP_SUMMARY
