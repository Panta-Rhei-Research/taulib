name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build TauLib
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lean build (via lean-action)
        uses: leanprover/lean-action@v1
        with:
          build-args: ""
          # lean-action automatically handles:
          # - elan/Lean installation from lean-toolchain
          # - .lake directory caching
          # - Mathlib cache detection (lake exe cache get)
          # - Running lake build

      # ===================================================================
      # peer-review-fixes-v1 (2026-04-19): POLICY ENFORCEMENT
      # ===================================================================
      # Pre-publication simulated peer review identified that the paper's
      # "tactics-only Mathlib" and "zero sorry in Books I-VI + three
      # methodological sorry in Book VII" claims were enforced only by
      # review convention — CI printed counts but did not assert them,
      # and no CI step rejected a forbidden-Mathlib-category import.
      # The two steps below convert both policies from convention to
      # merge-blocker.

      - name: Enforce tactics-only Mathlib import policy
        run: |
          set -euo pipefail
          # Forbidden Mathlib categories (mathematical content, not tactics).
          FORBIDDEN='^import Mathlib\.(Order|Algebra|CategoryTheory|Topology|Analysis|Data\.Nat|Logic)\b'
          # Allowlist exception: `Bridge/` subdirectories are designated
          # orthodox-bridge zones (per `BookIII/Bridge/` + `ScopeLabel`
          # convention). Mathlib.Algebra etc. imports there are EXPLICIT
          # bridges, not τ-native foundational code, and are explicitly
          # scoped under the `Tau.*.Bridge` namespace. The tactics-only
          # discipline still applies to ALL non-Bridge τ-native code.
          if hits=$(grep -rnE "$FORBIDDEN" TauLib/ --include='*.lean' | grep -vE '/Bridge/'); then
            echo "::error::Forbidden Mathlib mathematical-content import detected outside Bridge/."
            echo "::error::TauLib's tactics-only-Mathlib policy forbids imports from"
            echo "::error::Mathlib.{Order, Algebra, CategoryTheory, Topology, Analysis, Data.Nat, Logic}"
            echo "::error::in τ-native code. Place such imports under a Bridge/ subdirectory"
            echo "::error::(e.g. TauLib/BookI/Boundary/Bridge/) for explicit orthodox-bridge zones."
            echo "::error::Offending lines:"
            echo "$hits"
            exit 1
          fi
          echo "✓ Tactics-only Mathlib policy: no forbidden direct imports outside Bridge/ zones."

      - name: Enforce axiom and sorry count invariants
        # Delegated to scripts/check_no_sorry.py, which correctly handles
        # multi-line block comments, docstrings (/--, /-!), nested /- /- -/ -/,
        # and string literals — the edge cases where a pure grep pipeline
        # produces false positives because documentation prose quotes Lean
        # code like `theorem X : True := sorry` inside a /-! -/ block.
        # The Python checker strips all comments and string literals (with
        # line numbers preserved) before counting `^\s*axiom\s+` and
        # `\bsorry\b` matches, so prose never collides with code.
        run: python3 scripts/check_no_sorry.py --root TauLib --expected-axioms 3 --expected-sorry 0

      # ===================================================================
      # peer-review-fixes-v2 (2026-04-19): MACHINE-ATTESTED TCB PARTITION
      # ===================================================================
      # Round 2 of the pre-publication peer review noted that the site's
      # /verify/tcb.md per-theorem TCB partition was author-attested, not
      # machine-attested: the page named which theorems carry the
      # `native_decide` extension, but nothing in CI was emitting a
      # structured `#print axioms` artifact from Lean's own elaborator.
      #
      # This step closes the gap. It invokes the driver module
      # `TauLib.Meta.PrintAxioms` (which has a `#print axioms` call on
      # each of the eight headline theorems plus the three project
      # axioms), parses the elaboration output, and emits:
      #   - .github/workflows/output/print_axioms.json (machine-readable)
      #   - docs/print_axioms_report.md (human-readable partition)
      # The artifacts are uploaded by the subsequent step so they are
      # downloadable from every CI run without committing back to main.
      - name: Harvest per-theorem `#print axioms` report
        run: python3 scripts/print_axioms_report.py

      - name: Upload TCB classification artifact
        uses: actions/upload-artifact@v7
        with:
          name: print-axioms-report
          path: |
            .github/workflows/output/print_axioms.json
            docs/print_axioms_report.md
          if-no-files-found: error

      - name: Report statistics
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Use the same Python-based checker as the assertion step above,
          # in --report-only mode so we get the exact counts (after comment
          # and string stripping) for the summary table without re-triggering
          # the merge-blocker logic. This keeps the summary and the assertion
          # always in sync on the same source of truth.
          COUNTS=$(python3 scripts/check_no_sorry.py --root TauLib \
            --expected-axioms 3 --expected-sorry 0 --report-only | \
            grep '^Actual:' | sed 's/Actual: *//')
          # COUNTS is now of the form "axioms=N, sorry=M"
          AXIOMS=$(echo "$COUNTS" | sed -n 's/.*axioms=\([0-9]*\).*/\1/p')
          SORRY_COUNT=$(echo "$COUNTS" | sed -n 's/.*sorry=\([0-9]*\).*/\1/p')

          echo "## Build Statistics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Files | $(find TauLib -name '*.lean' | wc -l | tr -d ' ') |" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | $(find TauLib -name '*.lean' -exec cat {} + | wc -l | tr -d ' ') |" >> $GITHUB_STEP_SUMMARY
          echo "| Sorry | $SORRY_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Axioms | $AXIOMS |" >> $GITHUB_STEP_SUMMARY
